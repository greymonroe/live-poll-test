<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Wall — Display</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #e6edf3; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 28px;
    padding: 20px 32px; border-bottom: 1px solid #21262d; flex: 0 0 auto;
  }
  .qr { background:#fff; padding:10px; border-radius:12px; flex:0 0 auto; }
  .qr canvas, .qr img { display:block; }
  .prompt { font-size: clamp(20px, 3vw, 40px); font-weight: 700; line-height:1.15; }
  .join { margin-top: 8px; font-size: 15px; color:#8b949e; }
  .join b { color:#58a6ff; }
  main {
    flex: 1 1 auto; overflow-y: auto; padding: 24px 32px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .card {
    background:#161b22; border:1px solid #21262d; border-radius:14px;
    padding: 18px 22px; font-size: clamp(18px, 2.4vw, 30px); line-height:1.3;
    word-break: break-word; animation: pop .35s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop { from { opacity:0; transform: translateY(12px) scale(.97);} to {opacity:1; transform:none;} }
  .count { margin-left:auto; font-size:14px; color:#8b949e; align-self:flex-start; white-space:nowrap; }
  .empty { color:#6e7681; font-size: clamp(18px,2vw,26px); margin:auto; text-align:center; }
  .err { color:#f85149; padding:24px 32px; font-size:18px; line-height:1.5; }
  .err code { background:#161b22; padding:2px 6px; border-radius:5px; }
</style>
</head>
<body>
<header>
  <div class="qr" id="qr"></div>
  <div>
    <div class="prompt" id="prompt">Scan to share your thought</div>
    <div class="join">or go to <b id="joinurl">…</b></div>
  </div>
  <div class="count" id="count">0 responses</div>
</header>
<main id="wall">
  <div class="empty" id="empty">Waiting for responses…</div>
</main>

<!-- QR generator (client-side, no third party at runtime once cached) -->
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@04f46c6a/qrcode.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onChildAdded, query, limitToLast }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { firebaseConfig } from "./firebase-config.js";

  // Participant URL = this page's URL with index.html swapped for submit.html
  const base = location.href.replace(/index\.html.*$/, "").replace(/[^/]*$/, "");
  const submitURL = base + "submit.html";
  document.getElementById("joinurl").textContent = submitURL.replace(/^https?:\/\//, "");
  new QRCode(document.getElementById("qr"), { text: submitURL, width: 150, height: 150 });

  if (firebaseConfig.apiKey === "PASTE_ME") {
    document.querySelector("main").innerHTML =
      '<div class="err">⚠️ Firebase not configured yet.<br>Open <code>firebase-config.js</code> and paste your project config (instructions are in that file).</div>';
  } else {
    const db = getDatabase(initializeApp(firebaseConfig));
    const wall = document.getElementById("wall");
    const empty = document.getElementById("empty");
    const countEl = document.getElementById("count");
    let n = 0;
    // limitToLast keeps the screen from replaying thousands of old msgs on load
    onChildAdded(query(ref(db, "messages"), limitToLast(200)), (snap) => {
      const m = snap.val();
      if (!m || !m.text) return;
      if (empty) empty.remove();
      const div = document.createElement("div");
      div.className = "card";
      div.textContent = m.text;
      wall.prepend(div);            // newest on top
      countEl.textContent = (++n) + (n === 1 ? " response" : " responses");
    });
  }
</script>
</body>
</html>
