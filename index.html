<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poll Engine — Polls</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#0d1117; color:#e6edf3; padding:28px; max-width:900px; margin:0 auto; }
  h1 { margin:0 0 4px; } .sub { color:#8b949e; margin:0 0 24px; font-size:14px; }
  code { background:#161b22; padding:2px 6px; border-radius:5px; font-size:13px; }
  .poll { background:#161b22; border:1px solid #21262d; border-radius:14px; padding:16px 18px;
          margin-bottom:14px; display:flex; gap:16px; align-items:flex-start; }
  .poll .meta { flex:1; }
  .poll .q { font-size:17px; font-weight:600; }
  .poll .type { font-size:12px; color:#8b949e; text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
  .poll .links { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
  .poll .qr { background:#fff; padding:6px; border-radius:8px; flex:0 0 auto; }
  button.secondary { background:#21262d; color:#e6edf3; border:none; border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; }
  button.warn { background:#3a2d0a; color:#e3b341; }
  button.danger { background:#3d1418; color:#f85149; }
  a.btnlink { text-decoration:none; }
  .empty { color:#6e7681; }
</style>
</head>
<body>
  <h1>🗳️ Polls</h1>
  <p class="sub">Polls are created by a Claude Code agent (e.g. <code>python3 newpoll.py mc q1 "Question?" "A" "B"</code>). This page just lists them so you can open a display, grab a QR, or clear results.</p>
  <div id="list"><p class="empty">Loading…</p></div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@04f46c6a/qrcode.min.js"></script>
<script type="module">
  import { db, configured, pageURL, makeQR, notConfigured } from "./app.js";
  import { ref, remove, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  if (!configured) notConfigured();
  const list = document.getElementById("list");

  onValue(ref(db, "polls"), (snap) => {
    const polls = snap.val() || {};
    const ids = Object.keys(polls).sort((a, b) =>
      (polls[b].config?.created || 0) - (polls[a].config?.created || 0));
    if (!ids.length) { list.innerHTML = '<p class="empty">No polls yet. Create one with newpoll.py.</p>'; return; }
    list.innerHTML = "";
    for (const id of ids) {
      const c = polls[id].config; if (!c) continue;
      const n = polls[id].responses ? Object.keys(polls[id].responses).length : 0;
      const row = document.createElement("div");
      row.className = "poll";
      row.innerHTML =
        '<div class="qr"></div>' +
        '<div class="meta">' +
          '<div class="q"></div>' +
          '<div class="type">' + c.type + ' · ' + n + ' responses · id: ' + id + '</div>' +
          '<div class="links">' +
            '<a class="btnlink" target="_blank" href="' + pageURL("display.html", id) + '"><button class="secondary">📺 Open display</button></a>' +
            '<a class="btnlink" target="_blank" href="' + pageURL("submit.html", id) + '"><button class="secondary">📱 Phone view</button></a>' +
            '<button class="secondary warn" data-clear="' + id + '">Clear results</button>' +
            '<button class="secondary danger" data-del="' + id + '">Delete poll</button>' +
          '</div>' +
        '</div>';
      row.querySelector(".q").textContent = c.question;
      makeQR(row.querySelector(".qr"), pageURL("submit.html", id), 90);
      row.querySelector("[data-clear]").onclick = async () => {
        if (confirm('Clear all results for "' + c.question + '"?'))
          await remove(ref(db, "polls/" + id + "/responses"));
      };
      row.querySelector("[data-del]").onclick = async () => {
        if (confirm('Delete poll "' + c.question + '" and all its responses?'))
          await remove(ref(db, "polls/" + id));
      };
      list.appendChild(row);
    }
  });
</script>
</body>
</html>
